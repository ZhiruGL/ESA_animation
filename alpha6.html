<title>Alpha Shape (α = 6) — Functional Richness</title>
<style>
  :root{
    --bg: #fdfcfa;
    --ink: #1c1c1c;
    --muted: #78716a;
    --hairline: #e4ded2;
    --hull: #0f766e;
    --hull-fill: rgba(15,118,110,0.12);
    --track: #ece7db;
    --knob: #1c1c1c;
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0; height:100%;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .stage{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding: 4px 16px 20px;
    gap: 12px;
  }
  .canvas-wrap{
    position: relative;
    background: #ffffff;
    border: 1px solid var(--hairline);
    border-radius: 3px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.03);
  }
  canvas{
    display:block;
    border-radius: 3px;
  }
</style>
</head>
<body>
<div class="stage">
  <div class="canvas-wrap">
    <canvas id="cnv"></canvas>
  </div>
</div>

[245.61,190.49],[128.17,186.23],[214.22,162.86],[173.17,124.73],[219.9,160.94],[234.1,239.18],
[183.01,237.58],[205.96,136.5],[201.78,163.17],[228.52,185.07],[230.03,248.77],[265.83,153.17],
[267.46,175.27],[189.79,122.23],[186.76,261.25],[146.52,151.06],[169.05,152.06],[175.8,238.33],
[239.34,181.45],[156.4,182.79],[162.8,164.64],[243.69,218.56],[170.18,148.96],[238.82,243.21],
[141.19,231.95],[191.3,132.04],[207.72,131.19],[169.65,163.17],[254.48,232.32],[225.45,157.46],
[247.84,219.87],[224.51,132.86],[159.95,164.62],[131.75,209.83],[151.69,146.88],[249.3,180.51],
[166.74,253.02],[222.52,255.3],[131.14,237.95],[128.67,196.96],[127.36,186.45],[158.24,233.04],
[264.54,217.12],[170.19,225.11],[269.45,221.28],[237.49,274.14],[207.27,273.29],[272.03,173.2]
  ];
  const points = RAW_POINTS.map(p => ({ x: p[0], y: -p[1] }));

  // ---------- Delaunay triangulation (Bowyer-Watson) ----------
  function circumcircle(a,b,c){
    const ax=a.x, ay=a.y, bx=b.x, by=b.y, cx=c.x, cy=c.y;
    const d = 2*(ax*(by-cy)+bx*(cy-ay)+cx*(ay-by));
    if(Math.abs(d) < 1e-10) return null;
    const ux = ((ax*ax+ay*ay)*(by-cy)+(bx*bx+by*by)*(cy-ay)+(cx*cx+cy*cy)*(ay-by))/d;
    const uy = ((ax*ax+ay*ay)*(cx-bx)+(bx*bx+by*by)*(ax-cx)+(cx*cx+cy*cy)*(bx-ax))/d;
    return { x: ux, y: uy, r: Math.hypot(ax-ux, ay-uy) };
  }
  function delaunay(pts){
    const xs = pts.map(p=>p.x), ys = pts.map(p=>p.y);
    const minX = Math.min(...xs), maxX = Math.max(...xs);
    const minY = Math.min(...ys), maxY = Math.max(...ys);
    const dmax = Math.max(maxX-minX, maxY-minY)*10 + 10;
    const midX = (minX+maxX)/2, midY = (minY+maxY)/2;
    const st = [
      { x: midX - 2*dmax, y: midY - dmax },
      { x: midX, y: midY + 2*dmax },
      { x: midX + 2*dmax, y: midY - dmax }
    ];
    let triangles = [[st[0], st[1], st[2]]];
    for(const p of pts){
      const bad = [];
      for(const t of triangles){
        const cc = circumcircle(t[0], t[1], t[2]);
        if(cc && Math.hypot(cc.x-p.x, cc.y-p.y) < cc.r + 1e-9) bad.push(t);
      }
      const poly = [];
      for(const t of bad){
        const edges = [[t[0],t[1]],[t[1],t[2]],[t[2],t[0]]];
        for(const e of edges){
          let shared = false;
          for(const t2 of bad){
            if(t2 === t) continue;
            const e2s = [[t2[0],t2[1]],[t2[1],t2[2]],[t2[2],t2[0]]];
            for(const e2 of e2s){
              if((e[0]===e2[0] && e[1]===e2[1]) || (e[0]===e2[1] && e[1]===e2[0])) shared = true;
            }
          }
          if(!shared) poly.push(e);
        }
      }
      triangles = triangles.filter(t => bad.indexOf(t) === -1);
      for(const e of poly) triangles.push([e[0], e[1], p]);
    }
    return triangles.filter(t => !t.some(v => st.indexOf(v) !== -1));
  }

  const TRIANGLES = delaunay(points);
  const TRI_WITH_R = TRIANGLES.map(t => {
    const cc = circumcircle(t[0], t[1], t[2]);
    return { t, r: cc ? cc.r : Infinity };
  }).filter(x => isFinite(x.r));

  // alpha value 6 (of 0-100) maps to a circumradius threshold, same scale as
  // the original construction widget: threshold = (alphaValue/100) * 350
  const ALPHA_VALUE = 6;
  const ALPHA_RADIUS = (ALPHA_VALUE/100) * 350;
  const kept = TRI_WITH_R.filter(x => x.r <= ALPHA_RADIUS).map(x => x.t);

  // boundary edges = edges that belong to exactly one kept triangle
  function edgeKey(a,b){
    const ax=a.x.toFixed(3), ay=a.y.toFixed(3), bx=b.x.toFixed(3), by=b.y.toFixed(3);
    return (ax+','+ay) < (bx+','+by) ? ax+','+ay+'|'+bx+','+by : bx+','+by+'|'+ax+','+ay;
  }
  const edgeCount = new Map();
  const edgeCoords = new Map();
  kept.forEach(t=>{
    const edges = [[t[0],t[1]],[t[1],t[2]],[t[2],t[0]]];
    edges.forEach(([a,b])=>{
      const k = edgeKey(a,b);
      edgeCount.set(k, (edgeCount.get(k)||0)+1);
      edgeCoords.set(k, [a,b]);
    });
  });
  const boundaryEdges = [];
  edgeCount.forEach((count,k)=>{ if(count===1) boundaryEdges.push(edgeCoords.get(k)); });

  // ---------- canvas setup ----------
  const canvas = document.getElementById('cnv');
  const ctx = canvas.getContext('2d');
  const CSS_W = 460, CSS_H = 400;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = CSS_W*dpr; canvas.height = CSS_H*dpr;
  canvas.style.width = CSS_W+'px'; canvas.style.height = CSS_H+'px';
  ctx.scale(dpr,dpr);

  const xs = points.map(p=>p.x), ys = points.map(p=>p.y);
  const rangeX = Math.max(...xs) - Math.min(...xs);
  const rangeY = Math.max(...ys) - Math.min(...ys);
  const pad = Math.max(rangeX, rangeY) * 0.25;
  const minX = Math.min(...xs)-pad, maxX = Math.max(...xs)+pad;
  const minY = Math.min(...ys)-pad, maxY = Math.max(...ys)+pad;
  const M = 38;
  function toPx(pt){
    const x = M + (pt.x-minX)/(maxX-minX) * (CSS_W-2*M);
    const y = CSS_H - M - (pt.y-minY)/(maxY-minY) * (CSS_H-2*M);
    return {x,y};
  }

  // ---------- "nice" axis ticks ----------
  function niceTicks(min, max, target){
    const range = max - min;
    const rawStep = range / target;
    const mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
    const norm = rawStep / mag;
    let step;
    if(norm < 1.5) step = 1*mag;
    else if(norm < 3) step = 2*mag;
    else if(norm < 7) step = 5*mag;
    else step = 10*mag;
    const start = Math.ceil(min/step)*step;
    const ticks = [];
    for(let v = start; v <= max + 1e-9; v += step) ticks.push(Math.round(v*1000)/1000);
    return ticks;
  }
  const xTicks = niceTicks(minX, maxX, 6);
  const yTicks = niceTicks(minY, maxY, 6);

  function drawAxes(){
    ctx.save();
    ctx.strokeStyle = '#c9c2b2';
    ctx.fillStyle = '#78716a';
    ctx.font = '10px -apple-system, sans-serif';
    ctx.lineWidth = 1;

    // frame box
    ctx.strokeRect(M, M, CSS_W-2*M, CSS_H-2*M);

    // x ticks (bottom edge)
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    xTicks.forEach(v=>{
      const p = toPx({x:v, y:minY});
      ctx.beginPath();
      ctx.moveTo(p.x, CSS_H-M);
      ctx.lineTo(p.x, CSS_H-M+5);
      ctx.stroke();
      ctx.fillText(v, p.x, CSS_H-M+8);
    });

    // y ticks (left edge)
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    yTicks.forEach(v=>{
      const p = toPx({x:minX, y:v});
      ctx.beginPath();
      ctx.moveTo(M-5, p.y);
      ctx.lineTo(M, p.y);
      ctx.stroke();
      ctx.fillText(v, M-8, p.y);
    });
    ctx.restore();
  }

  function draw(){
    ctx.clearRect(0,0,CSS_W,CSS_H);
    drawAxes();

    // alpha shape: fill kept triangles, stroke only the outer boundary
    ctx.fillStyle = 'rgba(15,118,110,0.12)';
    kept.forEach(t=>{
      ctx.beginPath();
      t.forEach((v,i)=>{
        const px = toPx(v);
        if(i===0) ctx.moveTo(px.x, px.y); else ctx.lineTo(px.x, px.y);
      });
      ctx.closePath();
      ctx.fill();
    });
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#0f766e';
    ctx.lineJoin = 'round';
    boundaryEdges.forEach(([a,b])=>{
      const pa = toPx(a), pb = toPx(b);
      ctx.beginPath();
      ctx.moveTo(pa.x, pa.y);
      ctx.lineTo(pb.x, pb.y);
      ctx.stroke();
    });

    // points
    points.forEach(p=>{
      const px = toPx(p);
      ctx.beginPath();
      ctx.arc(px.x, px.y, 3, 0, Math.PI*2);
      ctx.fillStyle = '#ffffff';
      ctx.fill();
      ctx.lineWidth = 1;
      ctx.strokeStyle = '#1c1c1c';
      ctx.stroke();
    });

    // axis titles
    ctx.fillStyle = '#1c1c1c';
    ctx.font = '10.5px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText('Trait 1', CSS_W/2, CSS_H-6);
    ctx.save();
    ctx.translate(12, CSS_H/2);
    ctx.rotate(-Math.PI/2);
    ctx.fillText('Trait 2', 0, 0);
    ctx.restore();
  }

  draw();
})();
</script>
