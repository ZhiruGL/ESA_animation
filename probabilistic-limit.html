<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Probabilistic Metric — Parameter Explorer</title>
<style>
  :root{
    --bg: #fdfcfa;
    --ink: #1c1c1c;
    --muted: #78716a;
    --hairline: #e4ded2;
    --kde: #5b2d6d;
    --track: #ece7db;
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .stage{
    display:flex;
    flex-direction:row;
    align-items:flex-start;
    justify-content:center;
    padding: 10px 16px 20px;
    gap: 20px;
  }
  .canvas-wrap{
    position: relative;
    background: #ffffff;
    border: 1px solid var(--hairline);
    border-radius: 3px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    flex: none;
  }
  canvas{
    display:block;
    border-radius: 3px;
  }
  .panel{
    width: 250px;
    flex: none;
    display:flex;
    flex-direction:column;
    gap: 24px;
    padding-top: 4px;
  }
  .rule-row{
    display:flex;
    flex-direction:column;
    gap: 10px;
    border-bottom: 1px solid var(--hairline);
    padding-bottom: 18px;
  }
  .rule-row label{
    font-size: 15px;
    color: var(--muted);
    letter-spacing: 0.01em;
  }
  .control{
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    gap: 8px;
    user-select:none;
  }
  .control-row{
    display:flex;
    align-items:center;
    gap: 10px;
  }
  .control-label{
    font-size: 15px;
    color: var(--muted);
    letter-spacing: 0.01em;
    transition: color 200ms ease;
  }
  .control-label.active{ color: var(--ink); font-weight: 600; }
  .switch{
    position: relative;
    width: 56px;
    height: 24px;
    background: var(--track);
    border-radius: 12px;
    border: 1px solid var(--hairline);
    cursor: pointer;
    flex: none;
  }
  .knob{
    position:absolute;
    top: 2px; left: 2px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--ink);
    transition: transform 220ms cubic-bezier(.4,0,.2,1);
  }
  .switch.on .knob{
    transform: translateX(32px);
    background: var(--kde);
  }

  /* --- vertical sliders --- */
  .sliders-row{
    display:flex;
    flex-direction:row;
    justify-content:space-between;
    gap: 8px;
  }
  .slider-col{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap: 14px;
  }
  .slider-col label{
    font-size: 15px;
    color: var(--muted);
    letter-spacing: 0.01em;
    text-align:center;
    line-height: 1.3;
  }
  .slider-vertical-wrap{
    width: 36px;
    height: 300px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .slider-vertical-wrap input[type="range"]{
    width: 300px;
    height: 36px;
    margin:0;
    accent-color: var(--kde);
    transform: rotate(-90deg);
    transform-origin: center;
  }
  .slider-col .val{
    font-family: "SF Mono", "Menlo", "Consolas", monospace;
    font-size: 15px;
    color: var(--ink);
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="stage">
  <div class="canvas-wrap">
    <canvas id="cnv"></canvas>
  </div>

  <div class="panel">
    <div class="rule-row">
      <label>Bandwidth rule</label>
      <div class="control">
        <div class="control-row">
          <span class="control-label active" id="ruleLabelLeft">Scott's</span>
          <div class="switch" id="ruleSwitch"><div class="knob"></div></div>
          <span class="control-label" id="ruleLabelRight">Silverman's</span>
        </div>
      </div>
    </div>

    <div class="sliders-row">
      <div class="slider-col">
        <label for="bwx">Bandwidth<br>Trait 1</label>
        <div class="slider-vertical-wrap">
          <input type="range" id="bwx" min="0.3" max="3" step="0.05" value="1">
        </div>
        <span class="val" id="bwxVal">1.00×</span>
      </div>
      <div class="slider-col">
        <label for="bwy">Bandwidth<br>Trait 2</label>
        <div class="slider-vertical-wrap">
          <input type="range" id="bwy" min="0.3" max="3" step="0.05" value="1">
        </div>
        <span class="val" id="bwyVal">1.00×</span>
      </div>
      <div class="slider-col">
        <label for="mass">Mass<br>threshold</label>
        <div class="slider-vertical-wrap">
          <input type="range" id="mass" min="50" max="99" step="1" value="90">
        </div>
        <span class="val" id="massVal">90%</span>
      </div>
    </div>
  </div>
</div>

[183.01,237.58],[205.96,136.5],[201.78,163.17],[228.52,185.07],[230.03,248.77],[265.83,153.17],
[267.46,175.27],[189.79,122.23],[186.76,261.25],[146.52,151.06],[169.05,152.06],[175.8,238.33],
[239.34,181.45],[156.4,182.79],[162.8,164.64],[243.69,218.56],[170.18,148.96],[238.82,243.21],
[141.19,231.95],[191.3,132.04],[207.72,131.19],[169.65,163.17],[254.48,232.32],[225.45,157.46],
[247.84,219.87],[224.51,132.86],[159.95,164.62],[131.75,209.83],[151.69,146.88],[249.3,180.51],
[166.74,253.02],[222.52,255.3],[131.14,237.95],[128.67,196.96],[127.36,186.45],[158.24,233.04],
[264.54,217.12],[170.19,225.11],[269.45,221.28],[237.49,274.14],[207.27,273.29],[272.03,173.2]
  ];
  const points = RAW_POINTS.map(p => ({ x: p[0], y: -p[1] }));
  const n = points.length;

  // ---------- baseline bandwidths: Scott's rule vs Silverman's rule ----------
  function sd(vals){
    const m = vals.reduce((a,b)=>a+b,0)/vals.length;
    return Math.sqrt(vals.reduce((a,b)=>a+(b-m)*(b-m),0)/vals.length);
  }
  function quartile(sortedVals, q){
    const pos = (sortedVals.length-1)*q;
    const base = Math.floor(pos);
    const rest = pos - base;
    return sortedVals[base+1] !== undefined
      ? sortedVals[base] + rest*(sortedVals[base+1]-sortedVals[base])
      : sortedVals[base];
  }
  function iqr(vals){
    const s = vals.slice().sort((a,b)=>a-b);
    return quartile(s, 0.75) - quartile(s, 0.25);
  }

  const xsAll = points.map(p=>p.x), ysAll = points.map(p=>p.y);

  // Scott's rule: sd * n^(-1/(d+4)), d=2
  const scottFactor = Math.pow(n, -1/6);
  const baseBwX_scott = sd(xsAll) * scottFactor;
  const baseBwY_scott = sd(ysAll) * scottFactor;

  // Silverman's rule: 0.9 * min(sd, IQR/1.34) * n^(-1/5)
  const silvermanFactor = Math.pow(n, -1/5);
  const baseBwX_silverman = 0.9 * Math.min(sd(xsAll), iqr(xsAll)/1.34) * silvermanFactor;
  const baseBwY_silverman = 0.9 * Math.min(sd(ysAll), iqr(ysAll)/1.34) * silvermanFactor;

  let bandwidthRule = 'scott';

  // ---------- fixed plotting range (independent of bandwidth) ----------
  const rangeX = Math.max(...xsAll) - Math.min(...xsAll);
  const rangeY = Math.max(...ysAll) - Math.min(...ysAll);
  const pad = Math.max(rangeX, rangeY) * 0.25;
  const minX = Math.min(...xsAll)-pad, maxX = Math.max(...xsAll)+pad;
  const minY = Math.min(...ysAll)-pad, maxY = Math.max(...ysAll)+pad;

  // ---------- "nice" axis ticks ----------
  function niceTicks(min, max, target){
    const range = max - min;
    const rawStep = range / target;
    const mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
    const norm = rawStep / mag;
    let step;
    if(norm < 1.5) step = 1*mag;
    else if(norm < 3) step = 2*mag;
    else if(norm < 7) step = 5*mag;
    else step = 10*mag;
    const start = Math.ceil(min/step)*step;
    const ticks = [];
    for(let v = start; v <= max + 1e-9; v += step) ticks.push(Math.round(v*1000)/1000);
    return ticks;
  }
  const xTicks = niceTicks(minX, maxX, 6);
  const yTicks = niceTicks(minY, maxY, 6);

  // ---------- heat palette (paper -> gold -> coral -> rose -> deep violet) ----------
  const stops = [
    [253,252,250],
    [255,214,138],
    [255,140,105],
    [214, 64,110],
    [ 91, 33,109]
  ];
  function heatColor(t){
    t = Math.max(0, Math.min(1, t));
    const scaled = t * (stops.length-1);
    const idx = Math.min(stops.length-2, Math.floor(scaled));
    const f = scaled - idx;
    const a = stops[idx], b = stops[idx+1];
    const r = Math.round(a[0]+(b[0]-a[0])*f);
    const g = Math.round(a[1]+(b[1]-a[1])*f);
    const bl = Math.round(a[2]+(b[2]-a[2])*f);
    return `rgb(${r},${g},${bl})`;
  }

  // ---------- canvas setup ----------
  const canvas = document.getElementById('cnv');
  const ctx = canvas.getContext('2d');
  const CSS_W = 580, CSS_H = 480;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = CSS_W*dpr; canvas.height = CSS_H*dpr;
  canvas.style.width = CSS_W+'px'; canvas.style.height = CSS_H+'px';
  ctx.scale(dpr,dpr);

  const ML = 50, MT = 42, MB = 42, MR = 110;
  function toPx(x,y){
    const px = ML + (x-minX)/(maxX-minX) * (CSS_W-ML-MR);
    const py = CSS_H - MB - (y-minY)/(maxY-minY) * (CSS_H-MT-MB);
    return {x:px,y:py};
  }

  function drawAxes(){
    ctx.save();
    ctx.strokeStyle = '#c9c2b2';
    ctx.fillStyle = '#78716a';
    ctx.font = '14px -apple-system, sans-serif';
    ctx.lineWidth = 1;
    ctx.strokeRect(ML, MT, CSS_W-ML-MR, CSS_H-MT-MB);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    xTicks.forEach(v=>{
      const p = toPx(v, minY);
      ctx.beginPath();
      ctx.moveTo(p.x, CSS_H-MB);
      ctx.lineTo(p.x, CSS_H-MB+5);
      ctx.stroke();
      ctx.fillText(v, p.x, CSS_H-MB+8);
    });
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    yTicks.forEach(v=>{
      const p = toPx(minX, v);
      ctx.beginPath();
      ctx.moveTo(ML-5, p.y);
      ctx.lineTo(ML, p.y);
      ctx.stroke();
      ctx.fillText(v, ML-8, p.y);
    });
    ctx.restore();
  }

  function drawLegend(maxDens, threshold){
    const barW = 13;
    const barX = CSS_W - MR + 14;
    const barY = MT;
    const barH = CSS_H - MT - MB;
    ctx.save();
    const grad = ctx.createLinearGradient(0, barY, 0, barY+barH);
    const steps = 12;
    for(let i=0;i<=steps;i++){
      const t = i/steps;
      grad.addColorStop(1-t, heatColor(t));
    }
    ctx.fillStyle = grad;
    ctx.fillRect(barX, barY, barW, barH);
    ctx.strokeStyle = '#c9c2b2';
    ctx.lineWidth = 1;
    ctx.strokeRect(barX, barY, barW, barH);

    const threshT = maxDens > 0 ? threshold / maxDens : 0;
    const threshY = barY + barH * (1 - threshT);
    ctx.strokeStyle = '#1e3a5f';
    ctx.lineWidth = 1.4;
    ctx.setLineDash([4,3]);
    ctx.beginPath();
    ctx.moveTo(barX-3, threshY);
    ctx.lineTo(barX+barW+3, threshY);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = '#78716a';
    ctx.font = '12.5px -apple-system, sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText('High', barX+barW+5, barY-2);
    ctx.textBaseline = 'bottom';
    ctx.fillText('Low', barX+barW+5, barY+barH+2);
    ctx.textBaseline = 'middle';
    ctx.fillText('cutoff', barX+barW+5, threshY);

    ctx.fillStyle = '#1c1c1c';
    ctx.font = '13px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText('Density', barX+barW/2, barY-7);
    ctx.restore();
  }

  // ---------- recompute + redraw whenever a slider changes ----------
  const GRID = 85;
  const gx = new Array(GRID), gy = new Array(GRID);
  for(let i=0;i<GRID;i++) gx[i] = minX + (maxX-minX)*i/(GRID-1);
  for(let j=0;j<GRID;j++) gy[j] = minY + (maxY-minY)*j/(GRID-1);
  const cellArea = ((maxX-minX)/(GRID-1)) * ((maxY-minY)/(GRID-1));

  const off = document.createElement('canvas');
  off.width = GRID; off.height = GRID;
  const offCtx = off.getContext('2d');

  function marchingSquares(dens, threshold){
    const segs = [];
    for(let j=0;j<GRID-1;j++){
      for(let i=0;i<GRID-1;i++){
        const p0 = {x:gx[i],   y:gy[j],   v:dens[j][i]};
        const p1 = {x:gx[i+1], y:gy[j],   v:dens[j][i+1]};
        const p2 = {x:gx[i+1], y:gy[j+1], v:dens[j+1][i+1]};
        const p3 = {x:gx[i],   y:gy[j+1], v:dens[j+1][i]};
        const edges = [[p0,p1],[p1,p2],[p2,p3],[p3,p0]];
        const cross = [];
        for(const [a,b] of edges){
          const above_a = a.v >= threshold, above_b = b.v >= threshold;
          if(above_a !== above_b){
            const t = (threshold - a.v) / (b.v - a.v);
            cross.push({ x: a.x + t*(b.x-a.x), y: a.y + t*(b.y-a.y) });
          }
        }
        if(cross.length === 2) segs.push([cross[0], cross[1]]);
        else if(cross.length === 4){
          segs.push([cross[0], cross[1]]);
          segs.push([cross[2], cross[3]]);
        }
      }
    }
    return segs;
  }

  const bwxSlider = document.getElementById('bwx');
  const bwySlider = document.getElementById('bwy');
  const massSlider = document.getElementById('mass');
  const bwxVal = document.getElementById('bwxVal');
  const bwyVal = document.getElementById('bwyVal');
  const massVal = document.getElementById('massVal');

  let raf = null;
  function scheduleUpdate(){
    if(raf) return;
    raf = requestAnimationFrame(()=>{ raf = null; update(); });
  }

  function update(){
    const bwMultX = Number(bwxSlider.value);
    const bwMultY = Number(bwySlider.value);
    const massPct = Number(massSlider.value) / 100;

    bwxVal.textContent = bwMultX.toFixed(2)+'×';
    bwyVal.textContent = bwMultY.toFixed(2)+'×';
    massVal.textContent = Math.round(massPct*100)+'%';

    const baseBwX = bandwidthRule === 'silverman' ? baseBwX_silverman : baseBwX_scott;
    const baseBwY = bandwidthRule === 'silverman' ? baseBwY_silverman : baseBwY_scott;
    const bwX = baseBwX * bwMultX;
    const bwY = baseBwY * bwMultY;

    function kde(x,y){
      let s = 0;
      for(const p of points){
        const zx = (x-p.x)/bwX, zy = (y-p.y)/bwY;
        s += Math.exp(-0.5*(zx*zx+zy*zy));
      }
      return (s/n) / (2*Math.PI*bwX*bwY);
    }

    const dens = new Array(GRID);
    let maxDens = 0;
    for(let j=0;j<GRID;j++){
      dens[j] = new Array(GRID);
      for(let i=0;i<GRID;i++){
        const d = kde(gx[i], gy[j]);
        dens[j][i] = d;
        if(d > maxDens) maxDens = d;
      }
    }

    const flat = [];
    for(let j=0;j<GRID;j++) for(let i=0;i<GRID;i++) flat.push(dens[j][i]);
    const total = flat.reduce((a,b)=>a+b,0);
    const sorted = flat.slice().sort((a,b)=>b-a);
    let cum = 0, threshold = 0;
    for(const v of sorted){
      cum += v;
      if(cum/total >= massPct){ threshold = v; break; }
    }
    let cellsAbove = 0;
    for(const v of flat) if(v >= threshold) cellsAbove++;
    const hypervolume = cellArea * cellsAbove;

    const imgData = offCtx.createImageData(GRID, GRID);
    for(let j=0;j<GRID;j++){
      for(let i=0;i<GRID;i++){
        const t = dens[j][i] / maxDens;
        const col = heatColor(t);
        const [r,g,b] = col.match(/\d+/g).map(Number);
        const destRow = GRID-1-j;
        const idx = (destRow*GRID + i) * 4;
        imgData.data[idx] = r; imgData.data[idx+1] = g; imgData.data[idx+2] = b; imgData.data[idx+3] = 255;
      }
    }
    offCtx.putImageData(imgData, 0, 0);

    const contourSegs = marchingSquares(dens, threshold);

    ctx.clearRect(0,0,CSS_W,CSS_H);
    const tl = toPx(minX, maxY);
    const brc = toPx(maxX, minY);
    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(off, tl.x, tl.y, brc.x-tl.x, brc.y-tl.y);

    ctx.save();
    ctx.strokeStyle = '#1e3a5f';
    ctx.lineWidth = 1.6;
    ctx.setLineDash([5,4]);
    ctx.beginPath();
    contourSegs.forEach(seg=>{
      const a = toPx(seg[0].x, seg[0].y);
      const b = toPx(seg[1].x, seg[1].y);
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
    });
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    drawLegend(maxDens, threshold);
    drawAxes();

    points.forEach(p=>{
      const px = toPx(p.x, p.y);
      ctx.beginPath();
      ctx.arc(px.x, px.y, 3, 0, Math.PI*2);
      ctx.fillStyle = '#ffffff';
      ctx.fill();
      ctx.lineWidth = 1;
      ctx.strokeStyle = '#1c1c1c';
      ctx.stroke();
    });

    ctx.fillStyle = '#1c1c1c';
    ctx.font = '15px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'alphabetic';
    ctx.fillText('Trait 1', (ML + CSS_W-MR)/2, CSS_H-8);
    ctx.save();
    ctx.translate(18, CSS_H/2);
    ctx.rotate(-Math.PI/2);
    ctx.fillText('Trait 2', 0, 0);
    ctx.restore();
  }

  [bwxSlider, bwySlider, massSlider].forEach(s => s.addEventListener('input', scheduleUpdate));

  const ruleSwitch = document.getElementById('ruleSwitch');
  const ruleLabelLeft = document.getElementById('ruleLabelLeft');
  const ruleLabelRight = document.getElementById('ruleLabelRight');
  let ruleOn = false;
  function setRule(next){
    ruleOn = next;
    ruleSwitch.classList.toggle('on', ruleOn);
    ruleLabelLeft.classList.toggle('active', !ruleOn);
    ruleLabelRight.classList.toggle('active', ruleOn);
    bandwidthRule = ruleOn ? 'silverman' : 'scott';
    scheduleUpdate();
  }
  ruleSwitch.addEventListener('click', ()=> setRule(!ruleOn));

  update();
})();
</script>
</body>
</html>
