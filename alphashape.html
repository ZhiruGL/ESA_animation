// ================= Geometry primitives =================
function circumcircle(a,b,c) {
  const ax=a[0], ay=a[1], bx=b[0], by=b[1], cx=c[0], cy=c[1];
  const d = 2*(ax*(by-cy)+bx*(cy-ay)+cx*(ay-by));
  if (Math.abs(d) < 1e-10) return null;
  const ux = ((ax*ax+ay*ay)*(by-cy)+(bx*bx+by*by)*(cy-ay)+(cx*cx+cy*cy)*(ay-by))/d;
  const uy = ((ax*ax+ay*ay)*(cx-bx)+(bx*bx+by*by)*(ax-cx)+(cx*cx+cy*cy)*(bx-ax))/d;
  const r = Math.hypot(ax-ux, ay-uy);
  return {x: ux, y: uy, r: r};
}

function delaunay(points) {
  const xs = points.map(p=>p[0]), ys = points.map(p=>p[1]);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const dx = maxX-minX, dy = maxY-minY, dmax = Math.max(dx,dy)*10 + 10;
  const midX = (minX+maxX)/2, midY = (minY+maxY)/2;
  const st = [
    [midX - 2*dmax, midY - dmax],
    [midX, midY + 2*dmax],
    [midX + 2*dmax, midY - dmax]
  ];
  let triangles = [[st[0], st[1], st[2]]];

  for (const p of points) {
    const badTriangles = [];
    for (const t of triangles) {
      const cc = circumcircle(t[0], t[1], t[2]);
      if (cc && Math.hypot(cc.x - p[0], cc.y - p[1]) < cc.r + 1e-9) badTriangles.push(t);
    }
    const polygon = [];
    for (const t of badTriangles) {
      const edges = [[t[0],t[1]],[t[1],t[2]],[t[2],t[0]]];
      for (const e of edges) {
        let shared = false;
        for (const t2 of badTriangles) {
          if (t2 === t) continue;
          const e2s = [[t2[0],t2[1]],[t2[1],t2[2]],[t2[2],t2[0]]];
          for (const e2 of e2s) {
            if ((e[0]===e2[0] && e[1]===e2[1]) || (e[0]===e2[1] && e[1]===e2[0])) shared = true;
          }
        }
        if (!shared) polygon.push(e);
      }
    }
    triangles = triangles.filter(t => badTriangles.indexOf(t) === -1);
    for (const e of polygon) triangles.push([e[0], e[1], p]);
  }

  triangles = triangles.filter(t => !t.some(v => st.indexOf(v) !== -1));
  return triangles;
}

function triArea(a,b,c) {
  return Math.abs((b[0]-a[0])*(c[1]-a[1]) - (c[0]-a[0])*(b[1]-a[1])) / 2;
}

// ================= Precompute Delaunay once =================
const TRIANGLES = delaunay(RAW_POINTS);
const TRI_WITH_R = TRIANGLES.map(t => {
  const cc = circumcircle(t[0], t[1], t[2]);
  return { t: t, r: cc ? cc.r : Infinity };
}).filter(x => isFinite(x.r));

// Alpha slider (0-100) maps to a geometric circumradius threshold.
// 0 -> tightest triangles only (islands stay separate)
// 100 -> threshold well above the max circumradius, i.e. full triangulation / hull
const MAX_ALPHA_RADIUS = 350;
function sliderToAlpha(sliderVal) {
  return (sliderVal / 100) * MAX_ALPHA_RADIUS;
}

// ================= Rendering =================
const svgNS = "http://www.w3.org/2000/svg";
function el(tag, attrs) {
  const e = document.createElementNS(svgNS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
}

function trianglesToPath(tris) {
  let d = '';
  for (const t of tris) {
    d += 'M' + t[0][0] + ',' + t[0][1] + 'L' + t[1][0] + ',' + t[1][1] + 'L' + t[2][0] + ',' + t[2][1] + 'Z';
  }
  return d;
}

function renderPoints(svg, r) {
  const g = el('g', {});
  for (const p of RAW_POINTS) {
    g.appendChild(el('circle', { cx: p[0], cy: p[1], r: r, fill: '#333' }));
  }
  svg.appendChild(g);
}

function formatNum(a) {
  return Math.round(a).toLocaleString();
}

const svgTri = document.getElementById('viz-triangles');
const svgShape = document.getElementById('viz-shape');
const alphaDisplay = document.getElementById('alpha-value-display');
const slider = document.getElementById('alpha-slider');

function render(sliderVal) {
  const alpha = sliderToAlpha(sliderVal);
  const kept = TRI_WITH_R.filter(x => x.r <= alpha).map(x => x.t);
  const area = kept.reduce((s,t) => s + triArea(t[0],t[1],t[2]), 0);

  // --- Panel 1: full Delaunay triangulation, kept triangles highlighted ---
  svgTri.innerHTML = '';
  const gAll = el('g', {});
  for (const x of TRI_WITH_R) {
    const t = x.t;
    gAll.appendChild(el('path', {
      d: 'M'+t[0][0]+','+t[0][1]+'L'+t[1][0]+','+t[1][1]+'L'+t[2][0]+','+t[2][1]+'Z',
      fill: 'none', stroke: '#e0e0e0', 'stroke-width': 0.6
    }));
  }
  svgTri.appendChild(gAll);
  svgTri.appendChild(el('path', {
    d: trianglesToPath(kept), fill: 'rgba(46, 204, 113, 0.45)',
    stroke: '#2ecc71', 'stroke-width': 0.8
  }));
  renderPoints(svgTri, 2.3);

  // --- Panel 2: alpha shape filled ---
  svgShape.innerHTML = '';
  svgShape.appendChild(el('path', {
    d: trianglesToPath(kept), fill: 'rgba(52, 152, 219, 0.5)', stroke: 'none'
  }));
  renderPoints(svgShape, 2.3);

  // --- Metrics ---
  alphaDisplay.textContent = sliderVal;
}

  render(Number(slider.value));
});
