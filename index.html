<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Functional Diversity Metrics: Sensitivity to Central Point Removal</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #fff;
  }
  .wrap {
    display: flex; flex-direction: column; align-items: center;
    height: 100%; width: 100%;
    background: #fff; border: 1px solid #eee; border-radius: 12px;
    padding: 20px; box-sizing: border-box;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
  }
  .header {
    margin-bottom: 14px; font-weight: bold; font-size: 1.15em; color: #333;
    text-align: center;
  }
  .header span#removal-display { color: #e74c3c; }
  .panels {
    display: flex; flex-direction: row; gap: 15px; width: 100%; flex: 1; min-height: 0;
  }
  .panel {
    flex: 1; display: flex; flex-direction: column; align-items: center; min-width: 0;
  }
  .panel-title {
    font-size: 0.75em; color: #666; margin-bottom: 5px; font-weight: bold;
    text-transform: uppercase; letter-spacing: 0.03em;
  }
  .panel-canvas {
    position: relative; width: 100%; flex: 1; min-height: 260px;
    background: #fafafa; border: 1px solid #ddd; border-radius: 8px; overflow: hidden;
  }
  .panel-canvas svg { width: 100%; height: 100%; display: block; }
  .metric {
    margin-top: 6px; font-size: 0.78em; color: #444; font-variant-numeric: tabular-nums;
  }
  .metric b { color: #111; }
  .slider-row {
    width: 100%; display: flex; align-items: center; gap: 12px; margin-top: 18px;
  }
  input[type="range"] {
    flex: 1; height: 12px; cursor: pointer; accent-color: #e74c3c;
  }
  .legend {
    display: flex; gap: 18px; margin-top: 10px; font-size: 0.72em; color: #666;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .swatch { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    Proportion of Central Points Removed: <span id="removal-display">0</span>%
  </div>

  <div class="panels">
    <div class="panel">
      <div class="panel-title">1. Convex Hull</div>
      <div class="panel-canvas">
        <svg id="viz-hull" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
      <div class="metric">Functional Richness: <b id="hull-area">–</b></div>
    </div>

    <div class="panel">
      <div class="panel-title">2. Alpha Shape</div>
      <div class="panel-canvas">
        <svg id="viz-alpha" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
      <div class="metric">Functional Richness: <b id="alpha-area">–</b></div>
    </div>

    <div class="panel">
      <div class="panel-title">3. 95% Hypervolume</div>
      <div class="panel-canvas">
        <svg id="viz-hyper" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid meet"></svg>
      </div>
      <div class="metric">Functional Richness: <b id="hyper-area">–</b></div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><span class="swatch" style="background:#333;"></span> retained point</div>
    <div class="legend-item"><span class="swatch" style="background:#ccc;"></span> removed point</div>
  </div>

  <div class="slider-row">
    <input type="range" id="master-slider" min="0" max="100" value="0">
  </div>
</div>

<script>
(function(){

// ================= Geometry primitives =================
function convexHull(points) {
  const pts = points.slice().sort((a,b) => a[0]-b[0] || a[1]-b[1]);
  const cross = (o,a,b) => (a[0]-o[0])*(b[1]-o[1]) - (a[1]-o[1])*(b[0]-o[0]);
  const lower = [];
  for (const p of pts) {
    while (lower.length >= 2 && cross(lower[lower.length-2], lower[lower.length-1], p) <= 0) lower.pop();
    lower.push(p);
  }
  const upper = [];
  for (let i = pts.length - 1; i >= 0; i--) {
    const p = pts[i];
    while (upper.length >= 2 && cross(upper[upper.length-2], upper[upper.length-1], p) <= 0) upper.pop();
    upper.push(p);
  }
  lower.pop(); upper.pop();
  return lower.concat(upper);
}

function polygonArea(poly) {
  let a = 0;
  for (let i = 0; i < poly.length; i++) {
    const [x1,y1] = poly[i];
    const [x2,y2] = poly[(i+1)%poly.length];
    a += x1*y2 - x2*y1;
  }
  return Math.abs(a)/2;
}

function circumcircle(a,b,c) {
  const ax=a[0], ay=a[1], bx=b[0], by=b[1], cx=c[0], cy=c[1];
  const d = 2*(ax*(by-cy)+bx*(cy-ay)+cx*(ay-by));
  if (Math.abs(d) < 1e-10) return null;
  const ux = ((ax*ax+ay*ay)*(by-cy)+(bx*bx+by*by)*(cy-ay)+(cx*cx+cy*cy)*(ay-by))/d;
  const uy = ((ax*ax+ay*ay)*(cx-bx)+(bx*bx+by*by)*(ax-cx)+(cx*cx+cy*cy)*(bx-ax))/d;
  const r = Math.hypot(ax-ux, ay-uy);
  return {x: ux, y: uy, r: r};
}

function delaunay(points) {
  const xs = points.map(p=>p[0]), ys = points.map(p=>p[1]);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const dx = maxX-minX, dy = maxY-minY, dmax = Math.max(dx,dy)*10 + 10;
  const midX = (minX+maxX)/2, midY = (minY+maxY)/2;
  const st = [
    [midX - 2*dmax, midY - dmax],
    [midX, midY + 2*dmax],
    [midX + 2*dmax, midY - dmax]
  ];
  let triangles = [[st[0], st[1], st[2]]];

  for (const p of points) {
    const badTriangles = [];
    for (const t of triangles) {
      const cc = circumcircle(t[0], t[1], t[2]);
      if (cc && Math.hypot(cc.x - p[0], cc.y - p[1]) < cc.r + 1e-9) badTriangles.push(t);
    }
    const polygon = [];
    for (const t of badTriangles) {
      const edges = [[t[0],t[1]],[t[1],t[2]],[t[2],t[0]]];
      for (const e of edges) {
        let shared = false;
        for (const t2 of badTriangles) {
          if (t2 === t) continue;
          const e2s = [[t2[0],t2[1]],[t2[1],t2[2]],[t2[2],t2[0]]];
          for (const e2 of e2s) {
            if ((e[0]===e2[0] && e[1]===e2[1]) || (e[0]===e2[1] && e[1]===e2[0])) shared = true;
          }
        }
        if (!shared) polygon.push(e);
      }
    }
    triangles = triangles.filter(t => badTriangles.indexOf(t) === -1);
    for (const e of polygon) triangles.push([e[0], e[1], p]);
  }

  triangles = triangles.filter(t => !t.some(v => st.indexOf(v) !== -1));
  return triangles;
}

function triArea(a,b,c) {
  return Math.abs((b[0]-a[0])*(c[1]-a[1]) - (c[0]-a[0])*(b[1]-a[1])) / 2;
}

function alphaShapeTriangles(points, alphaPercentile) {
  if (points.length < 3) return { triangles: [], area: 0 };
  const tris = delaunay(points);
  const withR = tris.map(t => {
    const cc = circumcircle(t[0], t[1], t[2]);
    return { t: t, r: cc ? cc.r : Infinity };
  }).filter(x => isFinite(x.r));
  const radii = withR.map(x => x.r).sort((a,b)=>a-b);
  if (radii.length === 0) return { triangles: [], area: 0 };
  const idx = Math.min(radii.length - 1, Math.floor(alphaPercentile * (radii.length - 1)));
  const alpha = radii[idx];
  const kept = withR.filter(x => x.r <= alpha).map(x => x.t);
  const area = kept.reduce((s,t) => s + triArea(t[0],t[1],t[2]), 0);
  return { triangles: kept, area: area };
}

function gridHypervolume(points, bounds, targetMass, cell, bandwidth) {
  const minX = bounds[0], maxX = bounds[1], minY = bounds[2], maxY = bounds[3];
  const cols = Math.ceil((maxX-minX)/cell);
  const rows = Math.ceil((maxY-minY)/cell);
  const grid = [];
  for (let r = 0; r < rows; r++) grid.push(new Array(cols).fill(0));
  const h2 = bandwidth*bandwidth;
  for (let r = 0; r < rows; r++) {
    const cy = minY + (r+0.5)*cell;
    for (let c = 0; c < cols; c++) {
      const cx = minX + (c+0.5)*cell;
      let dens = 0;
      for (const p of points) {
        const ddx = p[0]-cx, ddy = p[1]-cy;
        dens += Math.exp(-(ddx*ddx+ddy*ddy)/(2*h2));
      }
      grid[r][c] = dens;
    }
  }
  const flat = [];
  let total = 0;
  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) { flat.push({r:r,c:c,v:grid[r][c]}); total += grid[r][c]; }
  flat.sort((a,b) => b.v - a.v);
  const cellsOn = [];
  let acc = 0;
  for (const f of flat) {
    if (acc >= targetMass * total) break;
    acc += f.v;
    cellsOn.push(f);
  }
  const cellArea = cell*cell;
  return { cellsOn: cellsOn, cell: cell, minX: minX, minY: minY, area: cellsOn.length * cellArea };
}

// ================= Data =================
const RAW_POINTS = [
[178.3007301692498,194.30952782825375],[137.86423232328156,190.72296541414232],

// ================= State =================
const cx0 = RAW_POINTS.reduce((s,p)=>s+p[0],0) / RAW_POINTS.length;
const cy0 = RAW_POINTS.reduce((s,p)=>s+p[1],0) / RAW_POINTS.length;

const hullFull = convexHull(RAW_POINTS);
const hullKeySet = new Set(hullFull.map(p => p[0].toFixed(4)+'_'+p[1].toFixed(4)));
const interiorPoints = RAW_POINTS.filter(p => !hullKeySet.has(p[0].toFixed(4)+'_'+p[1].toFixed(4)));
interiorPoints.sort((a,b) => Math.hypot(a[0]-cx0,a[1]-cy0) - Math.hypot(b[0]-cx0,b[1]-cy0));

const BOUNDS = [55, 335, 5, 300];

function keyOf(p){ return p[0].toFixed(4)+'_'+p[1].toFixed(4); }

function computeState(frac) {
  const nRemove = Math.floor(frac * interiorPoints.length);
  const removedSet = new Set(interiorPoints.slice(0, nRemove).map(keyOf));
  const retained = RAW_POINTS.filter(p => !removedSet.has(keyOf(p)));
  const removed = RAW_POINTS.filter(p => removedSet.has(keyOf(p)));

  const hull = convexHull(retained);
  const hullArea = polygonArea(hull);

  // Alpha percentile starts at 1.0 (== convex hull) when no points are removed,
  // and tightens toward 0.55 as more central points are removed — so the alpha
  // shape visually matches the hull at frac=0 and diverges as density drops.
  const alphaPercentile = Math.max(0.55, 1 - 0.5 * frac);
  const as = alphaShapeTriangles(retained, alphaPercentile);

  const hv = gridHypervolume(retained, BOUNDS, 0.95, 7, 22);

  return { retained, removed, hull, hullArea, alpha: as, hyper: hv };
}

// ================= Rendering =================
const svgNS = "http://www.w3.org/2000/svg";
function el(tag, attrs) {
  const e = document.createElementNS(svgNS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
}

function renderPoints(svg, retained, removed, r) {
  const g = el('g', {});
  for (const p of removed) {
    g.appendChild(el('circle', { cx: p[0], cy: p[1], r: r, fill: '#ccc' }));
  }
  for (const p of retained) {
    g.appendChild(el('circle', { cx: p[0], cy: p[1], r: r, fill: '#333' }));
  }
  svg.appendChild(g);
}

function pointsToPath(poly) {
  if (poly.length === 0) return '';
  let d = 'M' + poly[0][0] + ',' + poly[0][1];
  for (let i = 1; i < poly.length; i++) d += 'L' + poly[i][0] + ',' + poly[i][1];
  d += 'Z';
  return d;
}

function trianglesToPath(tris) {
  let d = '';
  for (const t of tris) {
    d += 'M' + t[0][0] + ',' + t[0][1] + 'L' + t[1][0] + ',' + t[1][1] + 'L' + t[2][0] + ',' + t[2][1] + 'Z';
  }
  return d;
}

function cellsToRects(cellsOn, cell, minX, minY) {
  return cellsOn.map(f => {
    return { x: minX + f.c*cell, y: minY + f.r*cell, w: cell, h: cell };
  });
}

function formatArea(a) {
  return Math.round(a).toLocaleString();
}

const svgHull = document.getElementById('viz-hull');
const svgAlpha = document.getElementById('viz-alpha');
const svgHyper = document.getElementById('viz-hyper');
const removalDisplay = document.getElementById('removal-display');
const hullAreaEl = document.getElementById('hull-area');
const alphaAreaEl = document.getElementById('alpha-area');
const hyperAreaEl = document.getElementById('hyper-area');
const slider = document.getElementById('master-slider');

function render(frac) {
  const s = computeState(frac);

  // --- Convex hull panel ---
  svgHull.innerHTML = '';
  svgHull.appendChild(el('path', {
    d: pointsToPath(s.hull), fill: 'rgba(46, 204, 113, 0.2)',
    stroke: '#2ecc71', 'stroke-width': 2
  }));
  renderPoints(svgHull, s.retained, s.removed, 2.2);

  // --- Alpha shape panel ---
  svgAlpha.innerHTML = '';
  svgAlpha.appendChild(el('path', {
    d: trianglesToPath(s.alpha.triangles), fill: 'rgba(52, 152, 219, 0.4)',
    stroke: '#3498db', 'stroke-width': 1
  }));
  renderPoints(svgAlpha, s.retained, s.removed, 2.2);

  // --- Hypervolume panel ---
  svgHyper.innerHTML = '';
  const rects = cellsToRects(s.hyper.cellsOn, s.hyper.cell, s.hyper.minX, s.hyper.minY);
  const gRect = el('g', {});
  for (const r of rects) {
    gRect.appendChild(el('rect', {
      x: r.x, y: r.y, width: r.w, height: r.h,
      fill: 'rgba(155, 89, 182, 0.45)'
    }));
  }
  svgHyper.appendChild(gRect);
  renderPoints(svgHyper, s.retained, s.removed, 2.2);

  // --- Metrics ---
  removalDisplay.textContent = Math.round(frac*100);
  hullAreaEl.textContent = formatArea(s.hullArea);
  alphaAreaEl.textContent = formatArea(s.alpha.area);
  hyperAreaEl.textContent = formatArea(s.hyper.area);
}

slider.addEventListener('input', function() {
  render(slider.value / 100);
});

render(0);

})();
</script>
